<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MyRePlayTV</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
</head>

<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <div class="logo">MRP</div>
        <div class="titles">
          <div class="name">MyRePlayTV</div>
          <div id="tagline" class="tagline">TV-style replays in seconds</div>
        </div>
      </div>

      <select id="langSel" class="select">
        <option value="en">EN</option>
        <option value="pt" selected>PT</option>
        <option value="el">EL</option>
        <option value="es">ES</option>
        <option value="it">IT</option>
      </select>
    </header>

    <main class="main">
      <section class="videoCard">
        <div id="videoWrap" class="videoWrap">
          <video id="player" class="player" playsinline webkit-playsinline></video>

          <div id="lockOverlay" class="lockOverlay" style="display:none">
            <div class="lockBox">
              <div id="lockTitle" class="lockTitle">Generating…</div>
              <div id="lockSub" class="lockSub">Do not touch the video while processing</div>
            </div>
          </div>

          <button id="recBtn" class="recBtn" type="button" style="display:none">● REC</button>
        </div>

        <div class="statusRow">
          <div id="status" class="status">Ready.</div>
          <div id="usageLine" class="usage">Free demo: loading…</div>
        </div>

        <div class="controls">
          <div class="row">
            <button id="btnUpload" class="btn" type="button">Import</button>
            <button id="btnCam" class="btn" type="button">Camera</button>
            <button id="btnGenerate" class="btn primary" type="button">Generate</button>
          </div>

          <div class="row">
            <button id="btnMark" class="btn" type="button">⭐ Mark</button>
            <button id="btnClear" class="btn ghost" type="button">Clear</button>
            <button id="btnDelete" class="btn danger" type="button">Reset</button>
          </div>

          <div class="row">
            <button id="leadBtn" class="btn badge" type="button">↩︎ 3s</button>
            <button id="repBtn" class="btn badge" type="button">⟲ 1×</button>
            <button id="musicBtn" class="btn badge" type="button">♪ Music: Off</button>
          </div>

          <div class="row">
            <select id="modeSel" class="select">
              <option value="full" selected>Original + Replays</option>
              <option value="replays">Replays only</option>
            </select>

            <select id="formatSel" class="select">
              <option value="original" selected>Original</option>
              <option value="vertical">Vertical 9:16</option>
            </select>
          </div>

          <div class="row">
            <button id="btnPreviewOriginal" class="btn ghost" type="button">Preview Original</button>
            <button id="btnPreviewGenerated" class="btn ghost" type="button" disabled>Preview Generated</button>
          </div>

          <div class="row">
            <button id="btnShareOriginal" class="btn ghost" type="button">Share original</button>
            <button id="btnShareGenerated" class="btn ghost" type="button" disabled>Share generated</button>
          </div>
        </div>

        <div class="hint">
          <div id="hintText">Tip: Play the video, tap ⭐ Mark right after the moment. The app auto-syncs the motion peak.</div>
        </div>

        <input id="fileInput" type="file" accept="video/*" hidden />
        <input id="musicInput" type="file" accept="audio/*" hidden />
      </section>

      <section class="marksCard">
        <div class="marksHeader">
          <div id="marksTitle" class="marksTitle">Marks</div>
        </div>
        <div id="marksList" class="marksList"></div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div id="modalBg" class="modalBg" style="display:none">
    <div class="modal">
      <div id="mTitle" class="mTitle">MyRePlayTV</div>
      <div id="mBody" class="mBody">…</div>
      <button id="mOk" class="btn primary" type="button">OK</button>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
